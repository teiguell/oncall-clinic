<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>OnCall Clinic — Patient App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 30% 20%, #EEF4FB 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, #F3F0EA 0%, transparent 60%),
      #F7F8FA;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  @keyframes pulseDot {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(3); opacity: 0; }
  }
  @keyframes mapPulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes stepPulse {
    0% { transform: scale(1); opacity: 0.35; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(320px) rotate(720deg); opacity: 0; }
  }
  @keyframes scaleIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* custom scrollbars hidden */
  ::-webkit-scrollbar { width: 0; background: transparent; }

  .screen-wrap > * { animation: fadeSlide 0.4s ease; }

  /* Tweaks panel */
  .tweaks {
    position: fixed; bottom: 20px; right: 20px;
    background: #0F172A; color: #fff;
    border-radius: 16px; padding: 14px;
    min-width: 220px; z-index: 1000;
    box-shadow: 0 8px 32px rgba(15,23,42,0.25);
    font-family: Inter, sans-serif; font-size: 13px;
    display: none;
  }
  .tweaks.open { display: block; animation: fadeSlide 0.2s ease; }
  .tweaks-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-weight: 600; }
  .tweaks-row { display: flex; gap: 4px; margin-bottom: 12px; }
  .tweaks-row:last-child { margin-bottom: 0; }
  .tweaks-btn {
    flex: 1; padding: 7px 10px; border-radius: 8px; cursor: pointer;
    background: rgba(255,255,255,0.08); color: #fff; font-size: 12px;
    border: none; font-family: inherit; font-weight: 500;
    transition: background 0.15s;
  }
  .tweaks-btn:hover { background: rgba(255,255,255,0.14); }
  .tweaks-btn.active { background: #3B82F6; color: #fff; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="translations.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="avatars.jsx"></script>
<script type="text/babel" src="map.jsx"></script>
<script type="text/babel" src="screen-dashboard.jsx"></script>
<script type="text/babel" src="screen-tracking.jsx"></script>
<script type="text/babel" src="screen-complete.jsx"></script>
<script type="text/babel" src="screen-chat.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "language": "es",
  "screen": "complete"
}/*EDITMODE-END*/;

function StatusBar({ dark }) {
  const c = dark ? '#fff' : '#0F172A';
  return (
    <div style={{
      position: "absolute", top: 0, left: 0, right: 0, zIndex: 100,
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "18px 28px 0", pointerEvents: "none",
    }}>
      <div style={{ fontSize: 15, fontWeight: 600, color: c, letterSpacing: -0.2, minWidth: 54 }}>9:41</div>
      <div style={{ width: 110, height: 30 }}/>
      <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
        <svg width="17" height="11" viewBox="0 0 17 11"><g fill={c}>
          <rect x="0" y="7" width="3" height="4" rx="0.5"/>
          <rect x="4.5" y="4.5" width="3" height="6.5" rx="0.5"/>
          <rect x="9" y="2" width="3" height="9" rx="0.5"/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.5"/>
        </g></svg>
        <svg width="24" height="11" viewBox="0 0 24 11">
          <rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke={c} strokeOpacity="0.4" fill="none"/>
          <rect x="2" y="2" width="17" height="7" rx="1.5" fill={c}/>
          <rect x="21.5" y="3.5" width="1.5" height="4" rx="0.5" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [etaMin, setEtaMin] = React.useState(12);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [editMode, setEditMode] = React.useState(false);

  // Simulate ETA ticking down
  React.useEffect(() => {
    const id = setInterval(() => {
      setEtaMin(prev => {
        if (prev <= 1) return 12;
        return prev - 1;
      });
    }, 4000);
    return () => clearInterval(id);
  }, []);

  // Edit mode bridge
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };

  const t = T[tweaks.language] || T.es;
  const screen = tweaks.screen;

  const renderScreen = () => {
    switch (screen) {
      case 'tracking':
        return <Tracking t={t} etaMin={Math.max(1, Math.min(8, etaMin))} onBack={() => update('screen', 'dashboard')} onOpenChat={() => update('screen', 'chat')} onComplete={() => update('screen', 'complete')}/>;
      case 'complete':
        return <Complete t={t} onBackHome={() => update('screen', 'dashboard')}/>;
      case 'chat':
        return <Chat t={t} onBack={() => update('screen', 'tracking')}/>;
      default:
        return <Dashboard t={t} etaMin={etaMin} onOpenTracking={() => update('screen', 'tracking')} onOpenChat={() => update('screen', 'chat')}/>;
    }
  };

  // Tab bar — attached to Dashboard state (hidden on tracking/chat/complete)
  const showTabs = screen === 'dashboard';

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
      {/* iPhone frame — 390 width */}
      <div style={{
        width: 390, height: 844,
        borderRadius: 54,
        background: "#0F172A",
        padding: 10,
        boxShadow: "0 40px 100px rgba(15,23,42,0.25), 0 0 0 1px rgba(15,23,42,0.1), inset 0 0 0 2px rgba(255,255,255,0.06)",
        position: "relative",
      }}>
        {/* Screen */}
        <div style={{
          width: "100%", height: "100%",
          borderRadius: 44, overflow: "hidden",
          position: "relative",
          background: "#FAFBFC",
        }}>
          {/* Dynamic island */}
          <div style={{
            position: "absolute", top: 11, left: "50%", transform: "translateX(-50%)",
            width: 120, height: 35, borderRadius: 22, background: "#0F172A", zIndex: 200,
          }}/>
          <StatusBar dark={screen === 'tracking'}/>

          {/* Screen content */}
          <div key={screen} className="screen-wrap" style={{ width: "100%", height: "100%", overflow: "hidden", position: "relative" }}>
            <div style={{ width: "100%", height: "100%", overflowY: "auto" }}>
              {renderScreen()}
            </div>
          </div>

          {/* Bottom tab bar (dashboard only) */}
          {showTabs && (
            <div style={{
              position: "absolute", bottom: 0, left: 0, right: 0,
              background: "rgba(255,255,255,0.92)",
              backdropFilter: "blur(20px) saturate(180%)",
              WebkitBackdropFilter: "blur(20px) saturate(180%)",
              borderTop: "1px solid #EEF1F5",
              padding: "10px 8px 24px",
              display: "flex", justifyContent: "space-around", alignItems: "flex-end",
              zIndex: 50,
            }}>
              {[
                { label: t.tabHome, icon: IconHome, active: true },
                { label: t.tabConsultations, icon: IconList, active: false },
                { label: t.tabChat, icon: IconChat, active: false, badge: true },
                { label: t.tabProfile, icon: IconUser, active: false },
              ].map((tab, i) => {
                const Ic = tab.icon;
                return (
                  <div key={i} onClick={() => tab.label === t.tabChat && update('screen', 'chat')} style={{
                    flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                    cursor: "pointer", padding: "4px 0", position: "relative",
                  }}>
                    <div style={{ position: "relative" }}>
                      <Ic size={22} stroke={tab.active ? "#3B82F6" : "#9CA3AF"} strokeWidth={tab.active ? 2 : 1.6} fill={tab.active ? "#3B82F6" : "none"} />
                      {tab.badge && (
                        <div style={{ position: "absolute", top: -2, right: -4, width: 8, height: 8, borderRadius: "50%", background: "#EF4444", border: "2px solid #fff" }}/>
                      )}
                    </div>
                    <div style={{
                      fontSize: 10, fontWeight: tab.active ? 600 : 500,
                      color: tab.active ? "#3B82F6" : "#9CA3AF", letterSpacing: -0.1,
                    }}>{tab.label}</div>
                  </div>
                );
              })}
              <div style={{
                position: "absolute", bottom: 7, left: "50%", transform: "translateX(-50%)",
                width: 134, height: 5, borderRadius: 100, background: "rgba(15,23,42,0.25)",
              }}/>
            </div>
          )}

          {/* Home indicator on other screens */}
          {!showTabs && (
            <div style={{
              position: "absolute", bottom: 8, left: "50%", transform: "translateX(-50%)",
              width: 134, height: 5, borderRadius: 100,
              background: screen === 'tracking' ? "rgba(15,23,42,0.25)" : "rgba(15,23,42,0.25)",
              zIndex: 100,
            }}/>
          )}
        </div>
      </div>

      {/* Caption / screen dots */}
      <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
        {[
          { key: 'dashboard', label: 'Dashboard' },
          { key: 'tracking', label: 'Tracking' },
          { key: 'complete', label: 'Complete' },
          { key: 'chat', label: 'Chat' },
        ].map(s => (
          <button key={s.key} onClick={() => update('screen', s.key)} style={{
            padding: "6px 12px", borderRadius: 999,
            background: screen === s.key ? "#0F172A" : "rgba(255,255,255,0.7)",
            color: screen === s.key ? "#fff" : "#0F172A",
            border: "1px solid " + (screen === s.key ? "#0F172A" : "#E5E7EB"),
            fontSize: 11, fontWeight: 500, cursor: "pointer",
            fontFamily: "inherit", letterSpacing: -0.1,
          }}>{s.label}</button>
        ))}
      </div>

      {/* Tweaks panel */}
      <div className={"tweaks" + (editMode ? " open" : "")}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.5, marginBottom: 10, color: "#fff" }}>TWEAKS</div>
        <div className="tweaks-label">Language</div>
        <div className="tweaks-row">
          {["es", "en"].map(l => (
            <button key={l} className={"tweaks-btn" + (tweaks.language === l ? " active" : "")} onClick={() => update('language', l)}>{l.toUpperCase()}</button>
          ))}
        </div>
        <div className="tweaks-label">Screen</div>
        <div className="tweaks-row" style={{ flexWrap: "wrap" }}>
          {[
            ['dashboard', 'Dashboard'],
            ['tracking', 'Tracking'],
            ['complete', 'Complete'],
            ['chat', 'Chat'],
          ].map(([k, l]) => (
            <button key={k} className={"tweaks-btn" + (tweaks.screen === k ? " active" : "")} onClick={() => update('screen', k)} style={{ flex: "1 1 45%" }}>{l}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
