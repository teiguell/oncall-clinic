<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>OnCall Clinic — Ibiza</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;520;580;600;620;680;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #EEF2F7;
    color: #0B1220;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overflow-x: hidden;
  }
  button { font-family: inherit; }
  a { -webkit-tap-highlight-color: transparent; }
  /* Scrollbar inside device */
  .device-scroll::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "lang": "es",
  "frame": "phone",
  "accent": "amber"
}/*EDITMODE-END*/;

function BookingSheet({ open, onClose, t }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: 'rgba(11,18,32,0.5)', backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'flex-end',
      animation: 'fade 0.2s ease',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: '#fff',
        borderTopLeftRadius: 24, borderTopRightRadius: 24,
        padding: '20px 22px 32px',
        animation: 'slideUp 0.28s cubic-bezier(0.2,0.9,0.3,1)',
      }}>
        <div style={{
          width: 44, height: 5, borderRadius: 99, background: 'rgba(15,23,42,0.12)',
          margin: '0 auto 18px',
        }}/>
        <div style={{
          fontSize: 11, fontWeight: 600, letterSpacing: '0.14em',
          color: '#3B82F6', textTransform: 'uppercase', marginBottom: 8,
        }}>{t.hero.eyebrow}</div>
        <div style={{
          fontSize: 22, fontWeight: 660, letterSpacing: '-0.02em', color: '#0B1220',
          marginBottom: 6,
        }}>{t.finalCta.title}</div>
        <div style={{ fontSize: 14, color: '#64748B', marginBottom: 18 }}>
          {t.finalCta.sub}
        </div>
        <div style={{
          display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16,
        }}>
          {[
            { l: '📍', t: 'Ibiza ciudad · Dalt Vila', s: '~8 min' },
            { l: '📍', t: 'Playa d’en Bossa', s: '~12 min' },
            { l: '📍', t: 'San Antonio', s: '~18 min' },
          ].map((r, i) => (
            <div key={i} style={{
              padding: 14, borderRadius: 12,
              border: '1px solid rgba(15,23,42,0.08)',
              display: 'flex', alignItems: 'center', gap: 10, fontSize: 14,
            }}>
              <span style={{ fontSize: 18 }}>{r.l}</span>
              <span style={{ flex: 1, fontWeight: 580 }}>{r.t}</span>
              <span style={{ color: '#10B981', fontSize: 12, fontWeight: 600 }}>{r.s}</span>
            </div>
          ))}
        </div>
        <button onClick={onClose} style={{
          width: '100%', padding: '16px', borderRadius: 14, border: 'none',
          background: 'linear-gradient(180deg, #3B82F6, #2563EB)',
          color: '#fff', fontSize: 16, fontWeight: 620, cursor: 'pointer',
          minHeight: 52,
          boxShadow: '0 10px 24px rgba(59,130,246,0.35)',
        }}>Continuar</button>
      </div>
    </div>
  );
}

function Page({ lang, onLang }) {
  const [booking, setBooking] = useState(false);
  const t = COPY[lang];
  const openBook = () => setBooking(true);

  return (
    <div style={{ background: '#FAFBFC', position: 'relative', overflow: 'hidden' }}>
      <Hero t={t} onRequest={openBook}/>
      <How t={t}/>
      <Services t={t}/>
      <Doctors t={t}/>
      <Trust t={t}/>
      <FAQ t={t}/>
      <FinalCTA t={t} onRequest={openBook}/>
      <Footer t={t} lang={lang} setLang={onLang}/>
      <BookingSheet open={booking} onClose={() => setBooking(false)} t={t}/>
    </div>
  );
}

// ─── Tweaks panel ─────────────────────────────────────────────
function TweaksPanel({ state, setState, onClose }) {
  const row = (label, children) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: '0.1em', color: '#64748B', textTransform: 'uppercase', marginBottom: 6 }}>{label}</div>
      {children}
    </div>
  );
  const pillGroup = (opts, value, onChange) => (
    <div style={{ display: 'flex', gap: 6, padding: 3, background: '#F1F5F9', borderRadius: 10 }}>
      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          flex: 1, padding: '8px 10px', borderRadius: 8, border: 'none',
          background: value === o.v ? '#fff' : 'transparent',
          boxShadow: value === o.v ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
          fontSize: 12, fontWeight: 580, color: value === o.v ? '#0B1220' : '#64748B',
          cursor: 'pointer',
        }}>{o.l}</button>
      ))}
    </div>
  );
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, width: 260, zIndex: 1000,
      background: '#fff', borderRadius: 16,
      boxShadow: '0 20px 60px rgba(15,23,42,0.18), 0 0 0 1px rgba(15,23,42,0.06)',
      padding: 16, fontFamily: 'Inter, system-ui', fontSize: 13,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 12,
      }}>
        <div style={{ fontSize: 13, fontWeight: 660, letterSpacing: '-0.01em' }}>Tweaks</div>
        <button onClick={onClose} style={{
          width: 24, height: 24, border: 'none', background: '#F1F5F9',
          borderRadius: 8, cursor: 'pointer', display: 'flex',
          alignItems: 'center', justifyContent: 'center', color: '#64748B',
        }}>×</button>
      </div>
      {row('Language', pillGroup([
        { v: 'es', l: 'Español' }, { v: 'en', l: 'English' },
      ], state.lang, v => setState({ ...state, lang: v })))}
      {row('Frame', pillGroup([
        { v: 'phone', l: 'iPhone' }, { v: 'full', l: 'Full-bleed' },
      ], state.frame, v => setState({ ...state, frame: v })))}
      {row('Accent vibe', pillGroup([
        { v: 'amber', l: 'Warm' }, { v: 'cool', l: 'Cool' }, { v: 'rose', l: 'Rose' },
      ], state.accent, v => setState({ ...state, accent: v })))}
    </div>
  );
}

// Accent palette for heroes/final CTA
const ACCENTS = {
  amber: { orb2: 'rgba(245,158,11,0.35)', finalTop: 'rgba(245,158,11,0.35)' },
  cool:  { orb2: 'rgba(59,130,246,0.35)', finalTop: 'rgba(16,185,129,0.30)' },
  rose:  { orb2: 'rgba(244,63,94,0.30)',  finalTop: 'rgba(244,63,94,0.30)' },
};

function App() {
  const [tw, setTw] = useState(TWEAKS);
  const [editMode, setEditMode] = useState(false);

  // Edit-mode host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (next) => {
    setTw(next);
    const edits = {};
    for (const k of Object.keys(next)) if (next[k] !== tw[k]) edits[k] = next[k];
    if (Object.keys(edits).length) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    }
  };

  // Accent CSS var
  useEffect(() => {
    document.documentElement.style.setProperty('--accent-glow', ACCENTS[tw.accent].orb2);
  }, [tw.accent]);

  const page = <Page lang={tw.lang} onLang={(l) => update({ ...tw, lang: l })} />;

  return (
    <div style={{
      minHeight: '100vh', width: '100%',
      display: 'flex', alignItems: tw.frame === 'phone' ? 'center' : 'stretch',
      justifyContent: 'center',
      padding: tw.frame === 'phone' ? '24px 12px' : 0,
      background: tw.frame === 'phone'
        ? 'radial-gradient(120% 80% at 50% 0%, #E6EEFB 0%, #EEF2F7 40%, #E9EEF4 100%)'
        : '#FAFBFC',
    }}>
      {tw.frame === 'phone' ? (
        <div data-screen-label="01 Landing — iPhone">
          <IOSDevice width={402} height={844}>
            <div className="device-scroll" style={{ height: '100%', overflow: 'auto', paddingTop: 0 }}>
              {page}
            </div>
          </IOSDevice>
        </div>
      ) : (
        <div data-screen-label="01 Landing — Full" style={{ width: '100%', maxWidth: 440, margin: '0 auto' }}>
          {page}
        </div>
      )}
      {editMode && <TweaksPanel state={tw} setState={update} onClose={() => {
        setEditMode(false);
        window.parent.postMessage({ type: '__deactivate_edit_mode' }, '*');
      }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
</style>
</body>
</html>
